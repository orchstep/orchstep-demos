name: one-workflow
# Inline environments (Style 1): defaults < group < environment, selected with --env.
# The steps never mention an environment — they only read {{ vars.* }}.
defaults:
  replicas: "1"
  db_host: localhost
  log_level: info
  monitoring: none

env_groups:
  nonprod:
    vars:
      log_level: debug
      monitoring: basic
  prod:
    vars:
      log_level: error
      monitoring: full

environments:
  dev:
    group: nonprod
    vars:
      db_host: dev-db
      replicas: "2"
  staging:
    group: nonprod
    vars:
      db_host: staging-db
      replicas: "4"          # env overrides its group
  production:
    group: prod
    vars:
      db_host: prod-db
      replicas: "10"

tasks:
  deploy:
    steps:
      - name: plan
        func: shell
        do: 'echo "deploy replicas={{ vars.replicas }} db={{ vars.db_host }} log={{ vars.log_level }} mon={{ vars.monitoring }}"'
      - name: health
        func: shell
        do: 'echo "health check against {{ vars.db_host }}"'
